<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASWEHG: All about Shortcut Window Excel Hwp Google 윈도우 액셀 한글 구글 단축키</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f9fc;--surface:#f0f2f7;--card:#fff;--border:#dde2ee;
  --accent:#2563eb;--accent2:#d97706;--accent3:#059669;--accent4:#dc2626;
  --text:#1a1e2e;--text2:#5a6380;--text3:#9aa0b0;
  --win:#2563eb;--xl:#059669;--hwp:#d97706;--gs:#dc2626;--note:#7c3aed;
  --mono:'JetBrains Mono',monospace;
  --sans:'Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:200;background:rgba(248,249,252,.97);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;height:50px;gap:2px;overflow-x:auto}
nav::-webkit-scrollbar{height:0}
.nav-logo{font-weight:900;font-size:14px;color:var(--text);margin-right:12px;
  white-space:nowrap;flex-shrink:0}
.nav-logo span{color:var(--accent)}
.tab-btn{padding:5px 11px;border-radius:6px;border:none;background:transparent;
  color:var(--text2);cursor:pointer;font-family:var(--sans);font-size:12px;
  font-weight:500;transition:all .15s;white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:5px}
.tab-btn:hover{background:var(--card);color:var(--text)}
.tab-btn.active{background:var(--card);color:var(--text);font-weight:700;
  box-shadow:0 1px 4px rgba(0,0,0,.08)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
[data-tab="win"] .dot{background:var(--win)}
[data-tab="xl"]  .dot{background:var(--xl)}
[data-tab="hwp"] .dot{background:var(--hwp)}
[data-tab="gs"]  .dot{background:var(--gs)}
[data-tab="subnote"] .dot{background:var(--note)}
[data-tab="memo"] .dot{background:var(--text3)}
.nav-right{margin-left:auto;flex-shrink:0;padding-left:8px}
.search-box{position:relative}
#gSearch{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:5px 10px 5px 28px;color:var(--text);font-family:var(--sans);font-size:11px;width:140px}
#gSearch:focus{outline:none;border-color:var(--accent);width:180px;transition:width .2s}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);
  color:var(--text3);font-size:11px;pointer-events:none}

/* ── MAIN ── */
main{max-width:960px;margin:0 auto;padding:16px 12px 80px}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── SEC HEADER ── */
.sec-hdr{display:flex;align-items:center;gap:8px;margin:0 0 12px;padding-bottom:10px;border-bottom:2px solid var(--border)}
.sec-title{font-size:16px;font-weight:900;letter-spacing:-.3px}
.sec-badge{padding:2px 9px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.5px}
.b-win{background:rgba(37,99,235,.1);color:var(--win)}
.b-xl{background:rgba(5,150,105,.1);color:var(--xl)}
.b-hwp{background:rgba(217,119,6,.1);color:var(--hwp)}
.b-gs{background:rgba(220,38,38,.1);color:var(--gs)}
.b-note{background:rgba(124,58,237,.1);color:var(--note)}

/* ── QUICK JUMP ── */
.qjump{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.jbtn{padding:4px 10px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text2);font-family:var(--sans);font-size:10px;
  cursor:pointer;transition:all .15s;white-space:nowrap}
.jbtn:hover,.jbtn:active{background:var(--card);color:var(--text);border-color:var(--accent)}

/* ── CATEGORY BLOCK ── */
.cat{margin-bottom:14px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cat-hd{display:flex;align-items:center;gap:7px;padding:9px 12px;background:var(--card);
  cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
.cat-hd:hover{background:#f5f6fa}
.cat-icon{font-size:13px}
.cat-nm{font-weight:700;font-size:12px}
.cat-cnt{margin-left:auto;font-size:10px;color:var(--text3);background:var(--surface);
  padding:1px 8px;border-radius:10px}
.chev{margin-left:6px;color:var(--text3);transition:transform .2s;font-size:9px}
.cat.collapsed .chev{transform:rotate(-90deg)}
.cat-bd{overflow:hidden;transition:max-height .25s ease}
.cat.collapsed .cat-bd{max-height:0!important}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface);color:var(--text2);font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.7px;padding:6px 8px;border-bottom:1px solid var(--border)}
th.th-num{width:20px;text-align:center;padding:6px 4px}
th.th-key{width:38%}
th.th-desc{}
th.th-act{width:60px;text-align:center}
td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle;line-height:1.45}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,0,0,.015)}
tr.mastered-row td{opacity:.38}
tr.mastered-row .kchip{text-decoration:line-through;opacity:.6}

.td-num{color:var(--text3);font-size:10px;text-align:center;padding:7px 3px;width:20px}
.td-key{padding:7px 8px;width:38%}
.td-desc{padding:7px 8px;font-size:12px;color:var(--text);line-height:1.5}
.td-act{padding:4px 6px;text-align:center;white-space:nowrap;width:56px}

/* key chip */
.kchip{font-family:var(--mono);font-size:11px;color:#78350f;
  background:#fef3c7;padding:2px 6px;border-radius:4px;
  border:1px solid #fde68a;display:inline-block;line-height:1.55;
  word-break:break-all;white-space:normal}
tr.important .kchip{background:#fef0c7;border-color:#f59e0b;color:#92400e;font-weight:600}

/* action buttons */
.btn-master{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);
  background:transparent;cursor:pointer;font-size:13px;display:inline-flex;
  align-items:center;justify-content:center;transition:all .15s;vertical-align:middle}
.btn-master:hover{border-color:#059669;background:rgba(5,150,105,.08)}
.btn-master.done{background:#059669;border-color:#059669;color:#fff}
.btn-fav{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);
  background:transparent;cursor:pointer;font-size:12px;display:inline-flex;
  align-items:center;justify-content:center;transition:all .15s;vertical-align:middle;margin-left:3px}
.btn-fav:hover{border-color:#d97706;background:rgba(217,119,6,.08)}
.btn-fav.starred{background:#fef3c7;border-color:#f59e0b;color:#d97706}

/* ── SUB-NOTE ── */
.sn-wrap{max-width:700px}
.sn-bar{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.sn-inp{flex:1;min-width:180px;background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--sans);font-size:13px}
.sn-inp:focus{outline:none;border-color:var(--note)}
.btn-sn-add{padding:8px 16px;background:var(--note);color:#fff;border:none;border-radius:8px;
  font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-sn-add:hover{opacity:.85}
.sn-filters{display:flex;gap:5px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.fbtn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;
  color:var(--text2);font-family:var(--sans);font-size:11px;cursor:pointer}
.fbtn.active{background:var(--note);color:#fff;border-color:var(--note)}
.sn-stats{margin-left:auto;font-size:10px;color:var(--text3)}
.sn-list{display:flex;flex-direction:column;gap:7px}
.sni{background:var(--card);border:1px solid var(--border);border-radius:9px;
  padding:11px 12px;display:flex;align-items:flex-start;gap:10px;transition:opacity .2s}
.sni.done{opacity:.38}
.sni.done .sni-text{text-decoration:line-through;color:var(--text3)}
.sni-chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-size:12px;margin-top:1px}
.sni-chk:hover{border-color:var(--note)}
.sni-chk.done{background:var(--note);border-color:var(--note);color:#fff}
.sni-body{flex:1}
.sni-text{font-size:13px;line-height:1.5}
.sni-yt{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#dc2626;
  text-decoration:none;margin-top:4px}
.sni-yt:hover{text-decoration:underline}
.sni-date{font-size:10px;color:var(--text3);margin-top:3px}
.sni-del{color:var(--text3);background:transparent;border:none;cursor:pointer;
  font-size:15px;padding:0 3px;flex-shrink:0}
.sni-del:hover{color:var(--accent4)}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}

/* ── MEMO ── */
.memo-wrap{max-width:700px}
.memo-sec{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px;margin-bottom:14px}
.memo-sec-title{font-size:11px;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.memo-ta{width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:7px;padding:9px;color:var(--text);font-family:var(--sans);
  font-size:13px;resize:vertical;min-height:140px;line-height:1.6}
.memo-ta:focus{outline:none;border-color:var(--accent)}
.yt-row{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.yt-inp{flex:1;min-width:140px;background:var(--surface);border:1px solid var(--border);
  border-radius:7px;padding:7px 9px;color:var(--text);font-family:var(--sans);font-size:12px}
.yt-inp:focus{outline:none;border-color:#dc2626}
.btn-yt{padding:7px 13px;background:#dc2626;color:#fff;border:none;border-radius:7px;
  font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer}
.btn-yt:hover{opacity:.85}
.yt-list{display:flex;flex-direction:column;gap:7px;max-height:300px;overflow-y:auto}
.yt-item{background:var(--surface);border:1px solid var(--border);border-radius:7px;
  padding:9px 10px;display:flex;align-items:center;gap:9px}
.yt-thumb{width:72px;height:41px;border-radius:4px;object-fit:cover;flex-shrink:0}
.yt-info{flex:1;min-width:0}
.yt-name{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.yt-link{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.yt-open{color:#dc2626;font-size:11px;text-decoration:none;white-space:nowrap}
.yt-del{color:var(--text3);background:transparent;border:none;cursor:pointer;font-size:14px;padding:0 2px}
.yt-del:hover{color:var(--accent4)}

/* ── FAVORITES LIST (in memo) ── */
.fav-item{background:var(--surface);border:1px solid #fde68a;border-radius:7px;
  padding:9px 12px;display:flex;align-items:center;gap:9px}
.fav-star{font-size:14px;flex-shrink:0}
.fav-body{flex:1;min-width:0}
.fav-key{font-family:var(--mono);font-size:11px;color:#78350f;margin-bottom:2px;word-break:break-all}
.fav-desc{font-size:12px;color:var(--text);line-height:1.4}
.fav-src{font-size:10px;color:var(--text3);margin-top:2px}
.fav-unfav{color:var(--text3);background:transparent;border:none;cursor:pointer;font-size:14px;padding:0 3px}
.fav-unfav:hover{color:var(--accent4)}

/* ── HIGHLIGHT ── */
mark.hl{background:rgba(217,119,6,.25);border-radius:2px;padding:0 1px}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:16px;background:var(--text);color:#fff;
  border-radius:8px;padding:9px 16px;font-size:12px;opacity:0;
  transform:translateY(8px);transition:all .25s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">⌨️ <span>ASWEHG</span></div>
  <button class="tab-btn active" data-tab="win"><span class="dot"></span>윈도우</button>
  <button class="tab-btn" data-tab="xl"><span class="dot"></span>엑셀</button>
  <button class="tab-btn" data-tab="hwp"><span class="dot"></span>한글HWP</button>
  <button class="tab-btn" data-tab="gs"><span class="dot"></span>구글시트</button>
  <button class="tab-btn" data-tab="subnote"><span class="dot"></span>서브노트</button>
  <button class="tab-btn" data-tab="memo"><span class="dot"></span>메모·즐겨찾기</button>
  <div class="nav-right">
    <div class="search-box">
      <span class="si">🔍</span>
      <input id="gSearch" type="text" placeholder="검색...">
    </div>
  </div>
</nav>

<main>

<div class="tab-panel active" id="tab-win">
  <div class="sec-hdr"><div class="sec-title">윈도우 단축키</div><span class="sec-badge b-win">WINDOWS</span></div>
  <div class="qjump" id="qj-win"></div>
  <div id="cats-win"></div>
</div>

<div class="tab-panel" id="tab-xl">
  <div class="sec-hdr"><div class="sec-title">엑셀 단축키</div><span class="sec-badge b-xl">EXCEL</span></div>
  <div class="qjump" id="qj-xl"></div>
  <div id="cats-xl"></div>
</div>

<div class="tab-panel" id="tab-hwp">
  <div class="sec-hdr"><div class="sec-title">한글(HWP) 단축키</div><span class="sec-badge b-hwp">한글 HWP</span></div>
  <div class="qjump" id="qj-hwp"></div>
  <div id="cats-hwp"></div>
</div>

<div class="tab-panel" id="tab-gs">
  <div class="sec-hdr"><div class="sec-title">구글 스프레드시트 vs 엑셀</div><span class="sec-badge b-gs">GOOGLE SHEETS</span></div>
  <div class="qjump" id="qj-gs"></div>
  <div id="cats-gs"></div>
</div>

<div class="tab-panel" id="tab-subnote">
  <div class="sec-hdr"><div class="sec-title">서브노트</div><span class="sec-badge b-note">SUB NOTE</span></div>
  <div class="sn-wrap">
    <div class="sn-bar">
      <input class="sn-inp" id="snText" placeholder="숙지할 내용 입력...">
      <input class="sn-inp" id="snYt" placeholder="유튜브 URL (선택)" style="max-width:200px">
      <button class="btn-sn-add" onclick="addSN()">추가 +</button>
    </div>
    <div class="sn-filters">
      <button class="fbtn active" onclick="setSNF('pending',this)">미숙지</button>
      <button class="fbtn" onclick="setSNF('all',this)">전체</button>
      <button class="fbtn" onclick="setSNF('done',this)">숙지완료</button>
      <span class="sn-stats" id="snStats"></span>
    </div>
    <div class="sn-list" id="snList"></div>
  </div>
</div>

<div class="tab-panel" id="tab-memo">
  <div class="sec-hdr"><div class="sec-title">메모 &amp; 즐겨찾기</div><span class="sec-badge" style="background:rgba(0,0,0,.06);color:var(--text2)">MEMO</span></div>
  <div class="memo-wrap">
    <div class="memo-sec">
      <div class="memo-sec-title">⭐ 즐겨찾기한 단축키</div>
      <div id="favList"><div class="empty">즐겨찾기한 단축키가 없습니다.<br><small style="color:var(--text3)">각 탭에서 ★ 버튼으로 추가하세요</small></div></div>
    </div>
    <div class="memo-sec">
      <div class="memo-sec-title">📝 자유 메모</div>
      <textarea class="memo-ta" id="memoTA" rows="7" placeholder="자유롭게 메모하세요..." oninput="saveMemo()"></textarea>
    </div>
    <div class="memo-sec">
      <div class="memo-sec-title">▶ 유튜브 링크</div>
      <div class="yt-row">
        <input class="yt-inp" id="ytUrl" placeholder="유튜브 URL...">
        <input class="yt-inp" id="ytTitle" placeholder="제목 (선택)">
        <button class="btn-yt" onclick="addYT()">추가</button>
      </div>
      <div class="yt-list" id="ytList"></div>
    </div>
  </div>
</div>

</main>
<div class="toast" id="toast"></div>

// ═══════════════════ STATE ═══════════════════
let states = JSON.parse(localStorage.getItem('itemStates')||'{}');
// key: "tab_catId_itemIndex" => {mastered, fav}
function getState(tab,catId,idx){
  const k=`${tab}__${catId}__${idx}`;
  return states[k]||{mastered:false,fav:false};
}
function setState(tab,catId,idx,patch){
  const k=`${tab}__${catId}__${idx}`;
  states[k]={...getState(tab,catId,idx),...patch};
  localStorage.setItem('itemStates',JSON.stringify(states));
}

// ═══════════════════ RENDER CATS ═══════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function buildRow(tab,catId,item,origIdx,displayIdx){
  const s=getState(tab,catId,origIdx);
  const imp=item.imp?'important':'';
  const mCls=s.mastered?'mastered-row':'';
  const mBtnCls=s.mastered?'done':'';
  const fCls=s.fav?'starred':'';
  const desc=esc(item.d).replace(/\n/g,'<br>');
  return `<tr class="${imp} ${mCls}" data-tab="${tab}" data-cat="${catId}" data-idx="${origIdx}" data-search="${esc((item.k+' '+item.d).toLowerCase())}">
    <td class="td-num">${displayIdx+1}</td>
    <td class="td-key"><span class="kchip">${esc(item.k)}</span></td>
    <td class="td-desc">${desc}</td>
    <td class="td-act">
      <button class="btn-master ${mBtnCls}" title="${s.mastered?'숙지완료 (해제하려면 클릭)':'숙지 완료'}" onclick="toggleMaster('${tab}','${catId}',${origIdx},this)">✓</button><button class="btn-fav ${fCls}" title="즐겨찾기" onclick="toggleFav('${tab}','${catId}',${origIdx},this)">★</button>
    </td>
  </tr>`;
}

function renderCats(tab){
  const cats=DATA[tab];
  const container=document.getElementById('cats-'+tab);
  const qj=document.getElementById('qj-'+tab);
  if(!container)return;
  let html='',qjHtml='';
  cats.forEach(cat=>{
    qjHtml+=`<button class="jbtn" onclick="document.getElementById('${cat.id}').scrollIntoView({behavior:'smooth',block:'start'})">${cat.icon} ${cat.name}</button>`;
    const pendingItems=cat.items.map((it,i)=>({it,i})).filter(({i})=>!getState(tab,cat.id,i).mastered);
    const doneItems=cat.items.map((it,i)=>({it,i})).filter(({i})=>getState(tab,cat.id,i).mastered);
    const sorted=[...pendingItems,...doneItems];
    let rows=sorted.map(({it,i},di)=>buildRow(tab,cat.id,it,i,di)).join('');
    html+=`<div class="cat" id="${cat.id}">
      <div class="cat-hd" onclick="toggleCat(this)">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-nm">${cat.name}</span>
        <span class="cat-cnt">${cat.items.length}개</span>
        <span class="chev">▼</span>
      </div>
      <div class="cat-bd" style="max-height:9999px">
        <table>
          <thead><tr>
            <th class="th-num">#</th>
            <th class="th-key">단축키</th>
            <th class="th-desc">설명</th>
            <th class="th-act"></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  });
  container.innerHTML=html;
  qj.innerHTML=qjHtml;
}

function toggleCat(hd){
  const wrap=hd.parentElement;
  const bd=wrap.querySelector('.cat-bd');
  if(wrap.classList.contains('collapsed')){
    wrap.classList.remove('collapsed');
    bd.style.maxHeight=bd.scrollHeight+'px';
    setTimeout(()=>bd.style.maxHeight='9999px',280);
  } else {
    bd.style.maxHeight=bd.scrollHeight+'px';
    requestAnimationFrame(()=>{wrap.classList.add('collapsed');bd.style.maxHeight='0';});
  }
}

function toggleMaster(tab,catId,idx,btn){
  const s=getState(tab,catId,idx);
  setState(tab,catId,idx,{mastered:!s.mastered});
  const tr=btn.closest('tr');
  if(!s.mastered){
    btn.classList.add('done');
    tr.classList.add('mastered-row');
    btn.title='숙지완료 (해제하려면 클릭)';
    // move row to bottom of tbody
    const tbody=tr.parentElement;
    tbody.appendChild(tr);
    // renumber
    renumberTbody(tbody);
    toast('숙지완료 처리됐습니다 ✓');
  } else {
    btn.classList.remove('done');
    tr.classList.remove('mastered-row');
    btn.title='숙지 완료';
    // move to top (before first mastered row)
    const tbody=tr.parentElement;
    const firstMastered=tbody.querySelector('.mastered-row');
    if(firstMastered && firstMastered!==tr) tbody.insertBefore(tr,firstMastered);
    else tbody.insertBefore(tr,tbody.firstChild);
    renumberTbody(tbody);
    toast('숙지완료 해제됐습니다');
  }
}

function renumberTbody(tbody){
  Array.from(tbody.querySelectorAll('tr')).forEach((tr,i)=>{
    const td=tr.querySelector('.td-num');
    if(td)td.textContent=i+1;
  });
}

function toggleFav(tab,catId,idx,btn){
  const s=getState(tab,catId,idx);
  const nowFav=!s.fav;
  setState(tab,catId,idx,{fav:nowFav});
  if(nowFav){btn.classList.add('starred');toast('즐겨찾기에 추가됐습니다 ⭐');}
  else{btn.classList.remove('starred');toast('즐겨찾기에서 제거됐습니다');}
  renderFavs();
}

// ═══════════════════ FAVORITES ═══════════════════
const TAB_NAMES={win:'윈도우',xl:'엑셀',hwp:'한글HWP',gs:'구글시트'};

function renderFavs(){
  const list=document.getElementById('favList');
  const favs=[];
  Object.keys(states).forEach(k=>{
    if(!states[k].fav)return;
    const [tab,catId,idx]=k.split('__');
    const idxN=parseInt(idx);
    const cat=DATA[tab]&&DATA[tab].find(c=>c.id===catId);
    if(!cat||!cat.items[idxN])return;
    const it=cat.items[idxN];
    favs.push({tab,catId,cat,idx:idxN,it,k});
  });
  if(!favs.length){
    list.innerHTML='<div class="empty">즐겨찾기한 단축키가 없습니다.<br><small style="color:var(--text3)">각 탭에서 ★ 버튼으로 추가하세요</small></div>';
    return;
  }
  list.innerHTML=favs.map(({tab,cat,idx,it,k})=>`
    <div class="fav-item" style="margin-bottom:7px">
      <span class="fav-star">⭐</span>
      <div class="fav-body">
        <div class="fav-key">${esc(it.k)}</div>
        <div class="fav-desc">${esc(it.d).replace(/\n/g,' | ')}</div>
        <div class="fav-src">${TAB_NAMES[tab]||tab} · ${cat.name}</div>
      </div>
      <button class="fav-unfav" title="즐겨찾기 해제" onclick="unfavFromMemo('${tab}','${cat.id}',${idx})">✕</button>
    </div>
  `).join('');
}

function unfavFromMemo(tab,catId,idx){
  setState(tab,catId,idx,{fav:false});
  // update btn in table if rendered
  const btn=document.querySelector(`tr[data-tab="${tab}"][data-cat="${catId}"][data-idx="${idx}"] .btn-fav`);
  if(btn)btn.classList.remove('starred');
  renderFavs();
  toast('즐겨찾기 해제됐습니다');
}

// ═══════════════════ TABS ═══════════════════
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const tab=btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+tab).classList.add('active');
  });
});

// ═══════════════════ SEARCH ═══════════════════
document.getElementById('gSearch').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  document.querySelectorAll('[data-search]').forEach(row=>{
    const show=!q||row.dataset.search.includes(q);
    row.style.display=show?'':'none';
    if(show&&q){
      row.querySelectorAll('.td-key,.td-desc').forEach(td=>{
        td.innerHTML=td.innerHTML.replace(/<mark class="hl">([^<]*)<\/mark>/g,'$1');
        const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
        td.innerHTML=td.innerHTML.replace(re,'<mark class="hl">$1</mark>');
      });
    }
  });
  if(!q)document.querySelectorAll('.hl').forEach(m=>{m.replaceWith(document.createTextNode(m.textContent));});
});

// ═══════════════════ SUB-NOTE ═══════════════════
let snFilter='pending';
let subnotes=JSON.parse(localStorage.getItem('subnotes')||'[]');
function saveSN(){localStorage.setItem('subnotes',JSON.stringify(subnotes));}

function addSN(){
  const t=document.getElementById('snText').value.trim();
  if(!t)return;
  const yt=document.getElementById('snYt').value.trim();
  subnotes.unshift({id:Date.now(),t,yt,done:false,date:new Date().toLocaleDateString('ko-KR')});
  saveSN();document.getElementById('snText').value='';document.getElementById('snYt').value='';
  renderSN();toast('서브노트에 추가했습니다 ✓');
}
function toggleSN(id){
  const s=subnotes.find(x=>x.id===id);if(s){s.done=!s.done;saveSN();renderSN();}
}
function delSN(id){
  subnotes=subnotes.filter(x=>x.id!==id);saveSN();renderSN();
}
function setSNF(f,btn){
  snFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderSN();
}
function getYtId(url){
  const m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([^&\n?#]+)/);
  return m?m[1]:null;
}
function renderSN(){
  const el=document.getElementById('snList');
  const tot=subnotes.length,done=subnotes.filter(x=>x.done).length;
  document.getElementById('snStats').textContent=`전체 ${tot} · 완료 ${done} · 미숙지 ${tot-done}`;
  let arr=subnotes;
  if(snFilter==='pending')arr=subnotes.filter(x=>!x.done);
  if(snFilter==='done')arr=subnotes.filter(x=>x.done);
  if(!arr.length){el.innerHTML=`<div class="empty">${snFilter==='pending'?'미숙지 항목 없음 — 모두 완료!':snFilter==='done'?'숙지완료 항목 없음':'서브노트가 비어있습니다'}</div>`;return;}
  el.innerHTML=arr.map(s=>`<div class="sni${s.done?' done':''}">
    <div class="sni-chk${s.done?' done':''}" onclick="toggleSN(${s.id})">${s.done?'✓':''}</div>
    <div class="sni-body">
      <div class="sni-text">${esc(s.t)}</div>
      ${s.yt?`<a class="sni-yt" href="${esc(s.yt)}" target="_blank" rel="noopener">▶ 유튜브 영상 보기</a>`:''}
      <div class="sni-date">${s.date||''}</div>
    </div>
    <button class="sni-del" onclick="delSN(${s.id})">✕</button>
  </div>`).join('');
}

// ═══════════════════ MEMO / YT ═══════════════════
let ytLinks=JSON.parse(localStorage.getItem('ytLinks')||'[]');
function saveMemo(){localStorage.setItem('memo',document.getElementById('memoTA').value);}
function saveYT(){localStorage.setItem('ytLinks',JSON.stringify(ytLinks));}

function addYT(){
  const url=document.getElementById('ytUrl').value.trim();if(!url)return;
  const title=document.getElementById('ytTitle').value.trim()||url;
  const id=getYtId(url);
  ytLinks.unshift({id:Date.now(),url,title,thumb:id?`https://img.youtube.com/vi/${id}/mqdefault.jpg`:''});
  saveYT();document.getElementById('ytUrl').value='';document.getElementById('ytTitle').value='';
  renderYT();toast('링크를 추가했습니다 ▶');
}
function delYT(id){ytLinks=ytLinks.filter(l=>l.id!==id);saveYT();renderYT();}
function renderYT(){
  const el=document.getElementById('ytList');
  if(!ytLinks.length){el.innerHTML='<div style="font-size:12px;color:var(--text3);padding:10px 0">저장된 링크가 없습니다.</div>';return;}
  el.innerHTML=ytLinks.map(l=>`<div class="yt-item">
    ${l.thumb?`<img class="yt-thumb" src="${l.thumb}" alt="">`:
      '<div class="yt-thumb" style="background:#f0f0f0;display:flex;align-items:center;justify-content:center;color:#dc2626;font-size:16px">▶</div>'}
    <div class="yt-info"><div class="yt-name">${esc(l.title)}</div><div class="yt-link">${esc(l.url)}</div></div>
    <a class="yt-open" href="${esc(l.url)}" target="_blank" rel="noopener">열기 →</a>
    <button class="yt-del" onclick="delYT(${l.id})">✕</button>
  </div>`).join('');
}

// ═══════════════════ TOAST ═══════════════════
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// ═══════════════════ ENTER KEYS ═══════════════════
document.getElementById('snText').addEventListener('keydown',e=>{if(e.key==='Enter')addSN();});
document.getElementById('ytUrl').addEventListener('keydown',e=>{if(e.key==='Enter')addYT();});

// ═══════════════════ INIT ═══════════════════
['win','xl','hwp','gs'].forEach(renderCats);
document.getElementById('memoTA').value=localStorage.getItem('memo')||'';
renderSN();
renderYT();
renderFavs();
</script>
