<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASWEHG: All about Shortcut Window Excel Hwp Google 윈도우 액셀 한글 구글 단축키</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f9fc;--surface:#f0f2f7;--card:#ffffff;--border:#dde2ee;
  --accent:#2563eb;--accent2:#d97706;--accent3:#059669;--accent4:#dc2626;
  --text:#1a1e2e;--text2:#5a6380;--text3:#8a93a8;
  --win:#2563eb;--xl:#059669;--hwp:#d97706;--gs:#dc2626;
  --note:#7c3aed;
  --mono:'JetBrains Mono',monospace;
  --sans:'Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;min-height:100vh}
/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;background:rgba(248,249,252,.97);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;height:52px;gap:4px}
.nav-logo{font-weight:900;font-size:15px;color:var(--text);letter-spacing:-0.5px;margin-right:16px;white-space:nowrap}
.nav-logo span{color:var(--accent)}
.tab-btn{padding:6px 14px;border-radius:6px;border:none;background:transparent;
  color:var(--text2);cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:500;
  transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab-btn:hover{background:var(--card);color:var(--text)}
.tab-btn.active{background:var(--card);color:var(--text);font-weight:700}
.tab-btn .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tab-btn[data-tab="win"] .dot{background:var(--win)}
.tab-btn[data-tab="xl"] .dot{background:var(--xl)}
.tab-btn[data-tab="hwp"] .dot{background:var(--hwp)}
.tab-btn[data-tab="gs"] .dot{background:var(--gs)}
.tab-btn[data-tab="subnote"] .dot{background:var(--note)}
.tab-btn[data-tab="memo"] .dot{background:var(--text2)}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.search-wrap{position:relative}
#globalSearch{background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:5px 10px 5px 30px;color:var(--text);font-family:var(--sans);font-size:12px;width:180px}
#globalSearch:focus{outline:none;border-color:var(--accent)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px}
/* ── MAIN ── */
main{max-width:1400px;margin:0 auto;padding:20px 16px 60px}
.tab-panel{display:none}
.tab-panel.active{display:block}
/* ── SECTION HEADER ── */
.sec-header{display:flex;align-items:center;gap:10px;margin:28px 0 12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sec-title{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.sec-badge{padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px}
.badge-win{background:rgba(37,99,235,.1);color:var(--win)}
.badge-xl{background:rgba(5,150,105,.1);color:var(--xl)}
.badge-hwp{background:rgba(217,119,6,.1);color:var(--hwp)}
.badge-gs{background:rgba(220,38,38,.1);color:var(--gs)}
.badge-note{background:rgba(124,58,237,.1);color:var(--note)}
/* ── CATEGORY ── */
.cat-wrap{margin-bottom:20px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cat-head{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--card);
  cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
.cat-head:hover{background:var(--surface)}
.cat-icon{font-size:13px}
.cat-name{font-weight:700;font-size:13px}
.cat-count{margin-left:auto;font-size:10px;color:var(--text3);background:var(--surface);
  padding:2px 8px;border-radius:10px}
.chevron{margin-left:8px;color:var(--text3);transition:transform .2s;font-size:10px}
.cat-wrap.collapsed .chevron{transform:rotate(-90deg)}
.cat-body{overflow:hidden;transition:max-height .3s ease}
.cat-wrap.collapsed .cat-body{max-height:0!important}
/* ── SHORTCUT TABLE ── */
table{width:100%;border-collapse:collapse}
th{background:var(--surface);color:var(--text2);font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.8px;padding:8px 12px;text-align:left;
  border-bottom:1px solid var(--border)}
td{padding:7px 12px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,0,0,.018)}
.num{color:var(--text3);font-size:11px;width:30px;text-align:center}
.shortcut{font-family:var(--mono);font-size:11px;color:#92400e;white-space:pre-line;
  background:rgba(217,119,6,.08);padding:2px 6px;border-radius:4px;
  border:1px solid rgba(217,119,6,.2);display:inline-block;line-height:1.6}
.desc{color:var(--text);font-size:12px;white-space:pre-line}
.note-cell{color:var(--text3);font-size:11px}
.important{background:rgba(217,119,6,.05)}
.important .shortcut{background:rgba(217,119,6,.15);border-color:rgba(217,119,6,.4)}
.star{color:var(--accent2);margin-left:4px;font-size:10px}
/* comparison table */
.comp-win{color:var(--xl);font-family:var(--mono);font-size:11px}
.comp-gs{color:var(--accent);font-family:var(--mono);font-size:11px}
.comp-none{color:var(--text3);font-style:italic;font-size:11px}
/* ── SUB-NOTE ── */
.subnote-wrap{max-width:900px;margin:0 auto}
.subnote-toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.input-group{display:flex;gap:8px;flex:1;min-width:260px}
.sn-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:9px 14px;color:var(--text);font-family:var(--sans);font-size:13px}
.sn-input:focus{outline:none;border-color:var(--note)}
.btn-add{padding:9px 18px;background:var(--note);color:#fff;border:none;border-radius:8px;
  font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-add:hover{opacity:.85}
.filter-row{display:flex;gap:6px}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;
  color:var(--text2);font-family:var(--sans);font-size:11px;cursor:pointer}
.filter-btn.active{background:var(--card);color:var(--text);border-color:var(--note)}
.sn-stats{margin-left:auto;font-size:11px;color:var(--text3)}
.sn-list{display:flex;flex-direction:column;gap:8px}
.sn-item{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;display:flex;align-items:flex-start;gap:12px;transition:all .2s}
.sn-item.mastered{opacity:.4}
.sn-item.mastered .sn-text{text-decoration:line-through;color:var(--text3)}
.sn-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .2s;margin-top:1px}
.sn-check:hover{border-color:var(--note)}
.sn-check.checked{background:var(--note);border-color:var(--note);color:#fff}
.sn-content{flex:1}
.sn-text{font-size:13px;line-height:1.5;margin-bottom:4px}
.sn-yt-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#dc2626;
  text-decoration:none;margin-top:4px}
.sn-yt-link:hover{text-decoration:underline}
.sn-del{color:var(--text3);background:transparent;border:none;cursor:pointer;
  font-size:16px;padding:0 4px;line-height:1;flex-shrink:0}
.sn-del:hover{color:var(--accent4)}
.sn-meta{font-size:10px;color:var(--text3);margin-top:4px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
/* ── MEMO ── */
.memo-wrap{max-width:900px;margin:0 auto}
.memo-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.memo-grid{grid-template-columns:1fr}}
.memo-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.memo-card-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;
  text-transform:uppercase;letter-spacing:.6px}
.memo-textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:10px;color:var(--text);font-family:var(--sans);font-size:13px;resize:vertical;
  min-height:160px;line-height:1.6}
.memo-textarea:focus{outline:none;border-color:var(--accent)}
.yt-input-row{display:flex;gap:8px;margin-bottom:10px}
.yt-url-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:8px 10px;color:var(--text);font-family:var(--sans);font-size:12px}
.yt-url-input:focus{outline:none;border-color:#dc2626}
.yt-title-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:8px 10px;color:var(--text);font-family:var(--sans);font-size:12px}
.btn-yt-add{padding:8px 14px;background:#dc2626;color:#fff;border:none;border-radius:8px;
  font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-yt-add:hover{opacity:.85}
.yt-list{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto}
.yt-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;display:flex;align-items:center;gap:10px}
.yt-thumb{width:80px;height:45px;border-radius:4px;object-fit:cover;flex-shrink:0;background:#ccc}
.yt-info{flex:1;min-width:0}
.yt-title{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.yt-url-small{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.yt-open{color:#dc2626;font-size:11px;text-decoration:none;white-space:nowrap}
.yt-del{color:var(--text3);background:transparent;border:none;cursor:pointer;font-size:14px;padding:0 2px}
.yt-del:hover{color:var(--accent4)}
/* ── SEARCH HIGHLIGHT ── */
.hl{background:rgba(217,119,6,.25);border-radius:2px;padding:0 1px}
/* ── QUICK JUMP ── */
.section-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.jump-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;
  color:var(--text2);font-family:var(--sans);font-size:11px;cursor:pointer;transition:all .15s}
.jump-btn:hover{background:var(--card);color:var(--text);border-color:var(--accent)}
/* ── scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:10px 18px;font-size:12px;opacity:0;transform:translateY(10px);
  transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">⌨️ <span>ShortKey</span> DB</div>
  <button class="tab-btn active" data-tab="win"><span class="dot"></span>윈도우</button>
  <button class="tab-btn" data-tab="xl"><span class="dot"></span>엑셀</button>
  <button class="tab-btn" data-tab="hwp"><span class="dot"></span>한글HWP</button>
  <button class="tab-btn" data-tab="gs"><span class="dot"></span>구글시트</button>
  <button class="tab-btn" data-tab="subnote"><span class="dot"></span>서브노트</button>
  <button class="tab-btn" data-tab="memo"><span class="dot"></span>메모·링크</button>
  <div class="nav-right">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="globalSearch" type="text" placeholder="단축키 검색...">
    </div>
  </div>
</nav>

<main>

<!-- ════════ 윈도우 ════════ -->
<div class="tab-panel active" id="tab-win">
  <div class="sec-header">
    <div class="sec-title">윈도우 단축키</div>
    <span class="sec-badge badge-win">WINDOWS</span>
  </div>
  <div class="section-nav" id="sn-win"></div>
  <div id="cats-win"></div>
</div>

<!-- ════════ 엑셀 ════════ -->
<div class="tab-panel" id="tab-xl">
  <div class="sec-header">
    <div class="sec-title">엑셀 단축키</div>
    <span class="sec-badge badge-xl">EXCEL</span>
  </div>
  <div class="section-nav" id="sn-xl"></div>
  <div id="cats-xl"></div>
</div>

<!-- ════════ 한글HWP ════════ -->
<div class="tab-panel" id="tab-hwp">
  <div class="sec-header">
    <div class="sec-title">한글(HWP) 단축키</div>
    <span class="sec-badge badge-hwp">한글 HWP</span>
  </div>
  <div class="section-nav" id="sn-hwp"></div>
  <div id="cats-hwp"></div>
</div>

<!-- ════════ 구글시트 ════════ -->
<div class="tab-panel" id="tab-gs">
  <div class="sec-header">
    <div class="sec-title">구글 스프레드시트 vs 엑셀 비교</div>
    <span class="sec-badge badge-gs">GOOGLE SHEETS</span>
  </div>
  <div class="section-nav" id="sn-gs"></div>
  <div id="cats-gs"></div>
</div>

<!-- ════════ 서브노트 ════════ -->
<div class="tab-panel" id="tab-subnote">
  <div class="sec-header">
    <div class="sec-title">서브노트</div>
    <span class="sec-badge badge-note">SUB NOTE</span>
  </div>
  <div class="subnote-wrap">
    <div class="subnote-toolbar">
      <div class="input-group">
        <input class="sn-input" id="snText" placeholder="숙지해야 할 단축키나 내용 입력...">
        <input class="sn-input" id="snYt" placeholder="유튜브 URL (선택)" style="max-width:220px">
        <button class="btn-add" onclick="addSubnote()">추가 +</button>
      </div>
    </div>
    <div class="subnote-toolbar" style="margin-top:-8px;margin-bottom:16px">
      <div class="filter-row">
        <button class="filter-btn active" data-filter="pending" onclick="setFilter('pending',this)">미숙지</button>
        <button class="filter-btn" data-filter="all" onclick="setFilter('all',this)">전체</button>
        <button class="filter-btn" data-filter="mastered" onclick="setFilter('mastered',this)">숙지완료</button>
      </div>
      <span class="sn-stats" id="snStats"></span>
    </div>
    <div class="sn-list" id="snList"></div>
  </div>
</div>

<!-- ════════ 메모·링크 ════════ -->
<div class="tab-panel" id="tab-memo">
  <div class="sec-header">
    <div class="sec-title">메모 &amp; 유튜브 링크</div>
    <span class="sec-badge" style="background:rgba(136,146,168,.15);color:var(--text2)">MEMO</span>
  </div>
  <div class="memo-wrap">
    <div class="memo-grid">
      <div class="memo-card" style="grid-column:1/-1">
        <div class="memo-card-title">📝 자유 메모</div>
        <textarea class="memo-textarea" id="memoText" placeholder="자유롭게 메모하세요. 단축키 관련 팁, 기억할 것들, 업무 노트 등..." rows="8" oninput="saveMemo()"></textarea>
      </div>
      <div class="memo-card" style="grid-column:1/-1">
        <div class="memo-card-title">▶️ 유튜브 링크 모음</div>
        <div class="yt-input-row">
          <input class="yt-url-input" id="ytUrl" placeholder="유튜브 URL 붙여넣기...">
          <input class="yt-title-input" id="ytTitle" placeholder="제목 (선택)">
          <button class="btn-yt-add" onclick="addYtLink()">추가</button>
        </div>
        <div class="yt-list" id="ytList"></div>
      </div>
    </div>
  </div>
</div>

</main>
<div class="toast" id="toast"></div>

<script>

// RENDER
// ═══════════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderCats(tab){
  const cats = DATA[tab];
  const container = document.getElementById('cats-'+tab);
  const snContainer = document.getElementById('sn-'+tab);
  if(!container) return;
  let html='', snHtml='';
  cats.forEach(cat=>{
    const cnt = cat.items.length;
    snHtml+=`<button class="jump-btn" onclick="document.getElementById('${cat.id}').scrollIntoView({behavior:'smooth',block:'start'})">${cat.icon} ${cat.name}</button>`;
    let rows='';
    if(tab==='gs'){
      // comparison layout
      cat.items.forEach((it,i)=>{
        const parts = (it.d||'').split('\n');
        const imp = it.imp?'important':'';
        rows+=`<tr class="${imp}" data-search="${esc((it.k+' '+it.d).toLowerCase())}">
          <td class="num">${i+1}</td>
          <td><span class="shortcut">${esc(it.k)}</span></td>
          <td class="desc">${parts.map(p=>esc(p)).join('<br>')}</td>
        </tr>`;
      });
      html+=`<div class="cat-wrap" id="${cat.id}">
        <div class="cat-head" onclick="toggleCat(this)">
          <span class="cat-icon">${cat.icon}</span>
          <span class="cat-name">${cat.name}</span>
          <span class="cat-count">${cnt}개</span>
          <span class="chevron">▼</span>
        </div>
        <div class="cat-body" style="max-height:9999px">
          <table><thead><tr><th style="width:30px">#</th><th>기능/단축키</th><th>내용</th></tr></thead>
          <tbody>${rows}</tbody></table>
        </div></div>`;
    } else {
      cat.items.forEach((it,i)=>{
        const imp = it.imp?'important':'';
        rows+=`<tr class="${imp}" data-search="${esc((it.k+' '+it.d).toLowerCase())}">
          <td class="num">${i+1}</td>
          <td><span class="shortcut">${esc(it.k)}</span></td>
          <td class="desc">${esc(it.d).replace(/\n/g,'<br>')}</td>
        </tr>`;
      });
      html+=`<div class="cat-wrap" id="${cat.id}">
        <div class="cat-head" onclick="toggleCat(this)">
          <span class="cat-icon">${cat.icon}</span>
          <span class="cat-name">${cat.name}</span>
          <span class="cat-count">${cnt}개</span>
          <span class="chevron">▼</span>
        </div>
        <div class="cat-body" style="max-height:9999px">
          <table><thead><tr><th style="width:30px">#</th><th style="width:220px">단축키</th><th>설명</th></tr></thead>
          <tbody>${rows}</tbody></table>
        </div></div>`;
    }
  });
  container.innerHTML=html;
  if(snContainer) snContainer.innerHTML=snHtml;
}

function toggleCat(head){
  const wrap = head.parentElement;
  const body = wrap.querySelector('.cat-body');
  if(wrap.classList.contains('collapsed')){
    wrap.classList.remove('collapsed');
    body.style.maxHeight = body.scrollHeight+'px';
    setTimeout(()=>body.style.maxHeight='9999px',300);
  } else {
    body.style.maxHeight = body.scrollHeight+'px';
    requestAnimationFrame(()=>{
      wrap.classList.add('collapsed');
      body.style.maxHeight='0';
    });
  }
}

// TABS
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+tab).classList.add('active');
  });
});

// SEARCH
document.getElementById('globalSearch').addEventListener('input',function(){
  const q = this.value.trim().toLowerCase();
  document.querySelectorAll('[data-search]').forEach(row=>{
    const match = !q || row.dataset.search.includes(q);
    row.style.display = match?'':'none';
    if(match && q){
      row.querySelectorAll('td').forEach(td=>{
        td.innerHTML = td.innerHTML.replace(/<mark class="hl">([^<]+)<\/mark>/g,'$1');
        td.innerHTML = td.innerHTML.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark class="hl">$1</mark>');
      });
    }
  });
  if(!q) document.querySelectorAll('.hl').forEach(m=>{
    const t=document.createTextNode(m.textContent);m.parentNode.replaceChild(t,m);
  });
});

// SUB-NOTE
// ═══════════════════════════════════════════
let snFilter='pending';
let subnotes = JSON.parse(localStorage.getItem('subnotes')||'[]');

function saveSubnotes(){localStorage.setItem('subnotes',JSON.stringify(subnotes));}

function addSubnote(){
  const text=document.getElementById('snText').value.trim();
  if(!text) return;
  const yt=document.getElementById('snYt').value.trim();
  subnotes.unshift({id:Date.now(),text,yt,mastered:false,date:new Date().toLocaleDateString('ko-KR')});
  saveSubnotes();
  document.getElementById('snText').value='';
  document.getElementById('snYt').value='';
  renderSubnotes();
  toast('서브노트에 추가했습니다 ✓');
}

function toggleMaster(id){
  const sn=subnotes.find(s=>s.id===id);
  if(sn) sn.mastered=!sn.mastered;
  saveSubnotes();
  renderSubnotes();
}

function delSubnote(id){
  subnotes=subnotes.filter(s=>s.id!==id);
  saveSubnotes();
  renderSubnotes();
}

function setFilter(f,btn){
  snFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSubnotes();
}

function getYtId(url){
  const m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([^&\n?#]+)/);
  return m?m[1]:null;
}

function renderSubnotes(){
  const list=document.getElementById('snList');
  const total=subnotes.length;
  const mastered=subnotes.filter(s=>s.mastered).length;
  document.getElementById('snStats').textContent=`전체 ${total}개 · 숙지완료 ${mastered}개 · 미숙지 ${total-mastered}개`;
  let filtered=subnotes;
  if(snFilter==='pending') filtered=subnotes.filter(s=>!s.mastered);
  if(snFilter==='mastered') filtered=subnotes.filter(s=>s.mastered);
  if(!filtered.length){
    list.innerHTML=`<div class="empty-state"><div class="icon">📝</div>
      ${snFilter==='pending'?'미숙지 항목이 없습니다. 모두 숙지 완료!':snFilter==='mastered'?'숙지완료 항목이 없습니다.':'서브노트가 비어있습니다.'}</div>`;
    return;
  }
  list.innerHTML=filtered.map(sn=>{
    const ytId=sn.yt?getYtId(sn.yt):null;
    const ytHtml=sn.yt?`<a class="sn-yt-link" href="${esc(sn.yt)}" target="_blank" rel="noopener">▶ 유튜브 영상 보기</a>`:'';
    return `<div class="sn-item${sn.mastered?' mastered':''}">
      <div class="sn-check${sn.mastered?' checked':''}" onclick="toggleMaster(${sn.id})">${sn.mastered?'✓':''}</div>
      <div class="sn-content">
        <div class="sn-text">${esc(sn.text)}</div>
        ${ytHtml}
        <div class="sn-meta">${sn.date||''}</div>
      </div>
      <button class="sn-del" onclick="delSubnote(${sn.id})" title="삭제">✕</button>
    </div>`;
  }).join('');
}

// MEMO
// ═══════════════════════════════════════════
let ytLinks = JSON.parse(localStorage.getItem('ytLinks')||'[]');

function saveMemo(){localStorage.setItem('memo',document.getElementById('memoText').value);}
function loadMemo(){
  const m=localStorage.getItem('memo')||'';
  document.getElementById('memoText').value=m;
}

function saveYtLinks(){localStorage.setItem('ytLinks',JSON.stringify(ytLinks));}

function addYtLink(){
  const url=document.getElementById('ytUrl').value.trim();
  if(!url) return;
  const title=document.getElementById('ytTitle').value.trim()||url;
  const id=getYtId(url);
  ytLinks.unshift({id:Date.now(),url,title,thumb:id?`https://img.youtube.com/vi/${id}/mqdefault.jpg`:''});
  saveYtLinks();
  document.getElementById('ytUrl').value='';
  document.getElementById('ytTitle').value='';
  renderYtLinks();
  toast('링크를 추가했습니다 ▶');
}

function delYtLink(id){
  ytLinks=ytLinks.filter(l=>l.id!==id);
  saveYtLinks();
  renderYtLinks();
}

function renderYtLinks(){
  const list=document.getElementById('ytList');
  if(!ytLinks.length){
    list.innerHTML='<div style="color:var(--text3);font-size:12px;padding:12px 0">저장된 유튜브 링크가 없습니다.</div>';
    return;
  }
  list.innerHTML=ytLinks.map(l=>`
    <div class="yt-item">
      ${l.thumb?`<img class="yt-thumb" src="${l.thumb}" alt="">`:
        '<div class="yt-thumb" style="background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:#dc2626;font-size:18px">▶</div>'}
      <div class="yt-info">
        <div class="yt-title">${esc(l.title)}</div>
        <div class="yt-url-small">${esc(l.url)}</div>
      </div>
      <a class="yt-open" href="${esc(l.url)}" target="_blank" rel="noopener">열기 →</a>
      <button class="yt-del" onclick="delYtLink(${l.id})" title="삭제">✕</button>
    </div>
  `).join('');
}

// TOAST
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// ENTER key for subnote
document.getElementById('snText').addEventListener('keydown',e=>{if(e.key==='Enter')addSubnote();});
document.getElementById('ytUrl').addEventListener('keydown',e=>{if(e.key==='Enter')addYtLink();});

// INIT
['win','xl','hwp','gs'].forEach(renderCats);
loadMemo();
renderSubnotes();
renderYtLinks();
</script>
